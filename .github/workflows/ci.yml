
name: DataOps CI Pipeline

# Déclencheur : Le pipeline se lance à chaque push sur la branche main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupérer le code du dépôt
    - name: Checkout repository code
      uses: actions/checkout@v3

    # 2. Installer la bonne version de Python sur le serveur GitHub
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-python-version: '3.10'

    # 3. Installer Flake8 pour la vérification du code (Linter)
    - name: Install Linting Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    # 4. Exécuter l'analyse statique du code
    - name: Run Linters (Flake8)
      run: |
        # Arrête le pipeline s'il y a des erreurs de syntaxe ou des symboles non définis
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Affiche de simples avertissements pour le reste du style (sans bloquer)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics



        